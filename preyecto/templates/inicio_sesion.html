{% extends "base.html" %}

{% block titulo %}Acceso NutriApp{% endblock %}

{% block contenido %}
<div class="row justify-content-center py-5">
    <div class="col-md-4">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">Iniciar Sesión</h3>
                    <p class="text-muted small">Ingresa tus datos de MongoDB</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 small" role="alert">
                    ⚠️ {{ error }}
                </div>
                {% endif %}

                <form action="/sesion" method="POST">
                    <div class="mb-3">
                        <label class="form-label small">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control" placeholder="admin@ejemplo.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="***" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">VERIFICAR DATOS</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="/" class="text-muted small text-decoration-none">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
