<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Tareas - NutriApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="/">🌿 NutriApp</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-light me-3 small">Hola, <b>{{ session['usuario_nombre'] }}</b></span>
                <div class="btn-group">
                    <a href="/tareas" class="btn btn-sm btn-success fw-bold">📋 Tareas</a>
                    <a href="/perfil" class="btn btn-sm btn-outline-light">Mi Perfil</a>
                    <a href="/salir" class="btn btn-sm btn-outline-danger">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div class="card p-4 shadow-lg border-0 mb-4" style="border-radius: 15px;">
                    <div class="card-body">
                        <h4 class="fw-bold text-success mb-3">Nueva Meta</h4>
                        <form action="/tareas" method="POST" class="d-flex">
                            <input type="text" name="descripcion" class="form-control me-2" placeholder="Ej: Beber 2L de agua" required>
                            <button type="submit" class="btn btn-success fw-bold px-4">AÑADIR</button>
                        </form>
                    </div>
                </div>

                <div class="card p-4 shadow-lg border-0" style="border-radius: 15px;">
                    <div class="card-body">
                        <h5 class="fw-bold text-muted mb-4">LISTA DE ACTIVIDADES</h5>
                        
                        <div class="list-group list-group-flush">
                            {% for t in tareas %}
                            <div class="list-group-item d-flex justify-content-between align-items-center border-bottom py-3">
                                <span class="fw-medium text-dark">{{ t.descripcion }}</span>
                                <a href="/eliminar/{{ t._id }}" class="btn btn-sm btn-outline-danger border-0">
                                    <small>ELIMINAR</small>
                                </a>
                            </div>
                            {% else %}
                            <p class="text-center text-muted">Aún no tienes tareas pendientes.</p>
                            {% endfor %}
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
