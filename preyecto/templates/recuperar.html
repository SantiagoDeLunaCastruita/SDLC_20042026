<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <title>Recuperar - NutriApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container"><a class="navbar-brand text-success fw-bold" href="/">🌿 NutriApp</a></div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-4 p-4 text-center">
                    <h3 class="fw-bold mb-4">Recuperar Acceso</h3>
                    {% if mensaje %}<div class="alert alert-{{ tipo }}">{{ mensaje }}</div>{% endif %}
                    
                    <form action="/recuperar" method="POST">
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold">Correo de la cuenta</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">BUSCAR CUENTA</button>
                    </form>
                    <div class="mt-3"><a href="/" class="text-muted small">Volver al inicio</a></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
