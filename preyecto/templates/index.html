<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <title>NutriApp - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="/">gestor de super areas</a>
            <div class="navbar-nav ms-auto">
                {% if logueado %}
                    <span class="nav-link text-white">Hola, {{ session['usuario_nombre'] }}</span>
                    <a href="/salir" class="btn btn-danger btn-sm ms-2">Salir</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                {% if not logueado %}
                <div class="card shadow border-0 rounded-4 p-4 text-center">
                    <h3 class="fw-bold mb-4">Iniciar Sesión</h3>
                    <form action="/sesion" method="POST">
                        <input type="email" name="email" class="form-control mb-3" placeholder="Correo" required>
                        <input type="password" name="password" class="form-control mb-3" placeholder="Contraseña" required>
                        <button type="submit" class="btn btn-success w-100 fw-bold">ENTRAR</button>
                    </form>
                    <div class="mt-4 pt-3 border-top">
                        <a href="/registro" class="d-block text-dark text-decoration-none small mb-2">¿No tienes cuenta? <b>Regístrate aquí</b></a>
                        <a href="/recuperar" class="text-success text-decoration-none small">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>
                {% else %}
                <div class="alert alert-success text-center shadow">
                    <h2>¡Bienvenido!</h2>
                    <p>Has accedido correctamente.</p>
                </div>
                {% endif %}
            </div>
        </div>
    </div>

</body>
</html>
